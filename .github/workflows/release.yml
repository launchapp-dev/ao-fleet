name: Fleet Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fleet-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Compute version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-${GITHUB_SHA::7}"
          fi
          echo "value=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Verify tag matches workspace version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          WORKSPACE_VERSION="$(grep '^version = ' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          if [[ "${TAG_VERSION}" != "${WORKSPACE_VERSION}" ]]; then
            echo "::error::Tag version v${TAG_VERSION} does not match workspace version ${WORKSPACE_VERSION}"
            exit 1
          fi

      - name: Build ao-fleet-cli
        run: cargo build --locked --release -p ao-fleet-cli --target ${{ matrix.target }}

      - name: Verify binary version
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/ao-fleet-cli"
          "${BIN}" --version

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.value }}"
          TARGET="${{ matrix.target }}"
          STAGE_DIR="ao-fleet-${VERSION}-${TARGET}"
          mkdir -p "${STAGE_DIR}"
          cp "target/${TARGET}/release/ao-fleet-cli" "${STAGE_DIR}/"
          cp LICENSE README.md "${STAGE_DIR}/"
          cat > "${STAGE_DIR}/release-metadata.json" <<EOF
          {
            "schema": "ao-fleet.release.v1",
            "version": "${VERSION}",
            "target": "${TARGET}",
            "git_ref": "${GITHUB_REF}",
            "git_sha": "${GITHUB_SHA}",
            "binary": "ao-fleet-cli"
          }
          EOF
          tar -czf "${STAGE_DIR}.tar.gz" "${STAGE_DIR}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ao-fleet-${{ steps.version.outputs.value }}-${{ matrix.target }}
          path: ao-fleet-${{ steps.version.outputs.value }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ao-fleet-${{ steps.version.outputs.value }}-${{ matrix.target }}.tar.gz
